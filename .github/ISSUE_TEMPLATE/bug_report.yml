name: Bug report
description: Report a reproducible bug in the add-on or build/release tooling.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Please include enough detail to reproduce the problem on a clean Bedrock world or server.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands, Bedrock version, and world or server setup details.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Add-on version
      placeholder: v0.1.0
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Bedrock client world
        - Bedrock Dedicated Server
        - Development tooling only
    validations:
      required: true

