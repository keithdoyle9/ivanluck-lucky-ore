name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Build release assets
        run: npm run mcaddon

      - name: Generate checksums
        shell: bash
        run: |
          cd dist/packages
          shasum -a 256 ivanluck.mcaddon ivanluck_bp.mcpack ivanluck_rp.mcpack > SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: |
            dist/packages/ivanluck.mcaddon
            dist/packages/ivanluck_bp.mcpack
            dist/packages/ivanluck_rp.mcpack
            dist/packages/SHA256SUMS.txt
