name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build and package
        run: npm run mcaddon

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-assets
          if-no-files-found: error
          path: |
            dist/packages/ivanluck.mcaddon
            dist/packages/ivanluck_bp.mcpack
            dist/packages/ivanluck_rp.mcpack

